<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="在真正值得的时候，把对话交还给你。" />
    <title>接管关系 - 灵犀</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="connection">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LX</span>
          <div class="brand-copy">
            <strong>灵犀</strong>
            <span>接管关系</span>
          </div>
        </div>
        <a class="topbar-link" href="../today/">更多关系</a>
      </header>

      <main class="page">
        <section class="candidate-hero hero-card-rich" id="candidateHero"></section>

        <section class="section">
          <div class="section-head">
            <h2>现在最适合你看的部分</h2>
          </div>
          <div class="grid grid-two" id="connectionOverview"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>灵犀心动报告</h2>
          </div>
          <div class="report-card" id="reportCard"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>你们上一段对话</h2>
          </div>
          <div class="chat-thread" id="chatThread"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>你可以自然接上的方式</h2>
          </div>
          <div class="stack" id="openerList"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>第一次见面更适合这样开始</h2>
          </div>
          <div class="grid grid-two" id="dateIdeas"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="bottom-link" href="../"><span>首页</span></a>
        <a class="bottom-link" href="../today/"><span>今日</span></a>
        <a class="bottom-link is-active" href="./"><span>接管</span></a>
        <a class="bottom-link" href="../profile/"><span>我的</span></a>
      </nav>
    </div>

    <script src="../data.js"></script>
    <script src="../app.js"></script>
