<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="灵犀心动报告，把分身之间真实发生过的磨合与火花讲给你。" />
    <title>心动报告 - 灵犀</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="report">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LX</span>
          <div class="brand-copy">
            <strong>灵犀</strong>
            <span>心动报告</span>
          </div>
        </div>
        <a class="topbar-link" href="../connection/">进入接管</a>
      </header>

      <main class="page">
        <section class="hero-card hero-card-rich" id="reportHero"></section>

        <section class="section">
          <div class="section-head">
            <h2>高分候选切换</h2>
            <p>你可以在心动报告层直接横向切换今天越过阈值的关系，不必回到上一页重新找。</p>
          </div>
          <div class="switcher-row" id="reportSwitcher"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>这份报告想告诉你的，不只是高分</h2>
          </div>
          <div id="reportNarrative"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>深层契合拆解</h2>
          </div>
          <div id="reportMetrics"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>你们在关系里分别是什么样的人</h2>
          </div>
          <div class="grid grid-two" id="reportPairing"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>分身之间真正出现过的火花</h2>
            <p>不是套话，而是让你看见你们为什么会互相靠近。</p>
          </div>
          <div class="stack" id="reportMoments"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>压力测试结果</h2>
          </div>
          <div class="grid grid-two" id="reportScripts"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>如果你接住这段关系，未来 90 天大概率会怎样发展</h2>
          </div>
          <div class="grid grid-three" id="reportForecast"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>仍然要你自己确认的部分</h2>
          </div>
          <div class="grid grid-two" id="reportRisks"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>第一句最适合这样开始</h2>
          </div>
          <div class="stack" id="reportAnchors"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>第一次见面怎么更自然</h2>
          </div>
          <div class="grid grid-two" id="reportDatePlan"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="bottom-link" href="../"><span>首页</span></a>
        <a class="bottom-link" href="../today/"><span>匹配</span></a>
        <a class="bottom-link is-active" href="./"><span>报告</span></a>
        <a class="bottom-link" href="../connection/"><span>接管</span></a>
        <a class="bottom-link" href="../profile/"><span>我的</span></a>
      </nav>
    </div>

    <script src="../data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
