<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="灵犀对你的理解，不只是你喜欢什么人，也包括你真正能和什么样的人走下去。"
    />
    <title>我的画像 - 灵犀</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="profile">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LX</span>
          <div class="brand-copy">
            <strong>灵犀</strong>
            <span>我的画像</span>
          </div>
        </div>
        <a class="topbar-link" href="../today/">匹配中心</a>
      </header>

      <main class="page">
        <section class="hero-card hero-card-rich" id="profileHero"></section>

        <section class="section">
          <div class="section-head">
            <h2>分身现在主要取材于这些内容</h2>
            <p>它为什么越来越像你，应该对你透明可见。</p>
          </div>
          <div class="grid grid-two" id="profileSources"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>灵犀已经更确定的你</h2>
          </div>
          <div class="grid grid-two" id="profileSignals"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>你不会轻易妥协的边界</h2>
          </div>
          <div class="stack" id="profileBoundaries"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>授权与安全边界</h2>
            <p>用户愿不愿意交给灵犀，不取决于概念够不够新，而取决于控制权是不是始终还在自己手里。</p>
          </div>
          <div class="grid grid-two" id="trustControls"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>已经沉淀下来的有效关系画像</h2>
          </div>
          <div class="stack" id="profileMemory"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>最近被你反馈修正过的判断</h2>
          </div>
          <div class="grid grid-two" id="profileCalibrations"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>可分享的恋爱人格海报</h2>
            <p>增长不一定要靠邀请码，海报和匿名邀约本身就可以成为带人进场的入口。</p>
          </div>
          <div id="posterPreview"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>你也可以主动发起一轮匿名邀约</h2>
          </div>
          <div id="inviteCard"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="bottom-link" href="../"><span>首页</span></a>
        <a class="bottom-link" href="../today/"><span>匹配</span></a>
        <a class="bottom-link" href="../report/"><span>报告</span></a>
        <a class="bottom-link" href="../connection/"><span>接管</span></a>
        <a class="bottom-link is-active" href="./"><span>我的</span></a>
      </nav>
    </div>

    <script src="../data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
