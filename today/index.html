<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="灵犀匹配中心，把云端筛选、压力测试和可接管对象集中展示给你。" />
    <title>匹配中心 - 灵犀</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="today">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LX</span>
          <div class="brand-copy">
            <strong>灵犀</strong>
            <span>匹配中心</span>
          </div>
        </div>
        <a class="topbar-link" href="../report/">查看报告</a>
      </header>

      <main class="page">
        <section class="hero-card hero-card-rich" id="matchesHero"></section>

        <section class="section">
          <div class="section-head">
            <h2>已通过心动阈值</h2>
            <p>这几段关系已经通过深层场景测试，可以直接进入报告或真人接管。</p>
          </div>
          <div class="stack" id="readyCandidates"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>继续在后台验证</h2>
            <p>还没有足够成熟的关系，继续留在云端，不提前进入你的今天。</p>
          </div>
          <div class="stack" id="waitingCandidates"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>这一轮重点场景测试</h2>
            <p>不只看资料是否好看，而是看进入真实生活后，关系能不能站得住。</p>
          </div>
          <div class="grid grid-two" id="sceneLibrary"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>今天推回给你的共鸣内容</h2>
            <p>灵犀会先代看广场，再把你更可能有感受的内容留给你自己。</p>
          </div>
          <div class="stack" id="plazaDigest"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="bottom-link" href="../"><span>首页</span></a>
        <a class="bottom-link is-active" href="./"><span>匹配</span></a>
        <a class="bottom-link" href="../report/"><span>报告</span></a>
        <a class="bottom-link" href="../connection/"><span>接管</span></a>
        <a class="bottom-link" href="../profile/"><span>我的</span></a>
      </nav>
    </div>

    <script src="../data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
