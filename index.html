<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="灵犀，帮你先筛掉不值得消耗时间的关系，只把真正值得回应的人带到你面前。"
    />
    <title>灵犀</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LX</span>
          <div class="brand-copy">
            <strong>灵犀</strong>
            <span id="greetingText">晚上好</span>
          </div>
        </div>
        <a class="topbar-link" href="profile/">我的画像</a>
      </header>

      <main class="page">
        <section class="hero-card hero-card-rich">
          <div class="hero-copy-block">
            <p class="eyebrow" id="todayDate">今天</p>
            <h1 id="heroTitle">今天有 2 段关系，值得你回应。</h1>
            <p class="hero-text" id="heroSummary"></p>
            <div class="hero-actions">
              <a class="button button-primary" href="today/">查看今日简报</a>
              <a class="button button-secondary" href="connection/?candidate=lin">继续接住这段关系</a>
            </div>
          </div>
          <div class="hero-side" id="heroAside"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>今晚你不需要再自己完成的事</h2>
          </div>
          <div class="grid grid-two" id="savedEffortGrid"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>今晚最值得你分配注意力的关系</h2>
          </div>
          <div class="stack" id="priorityCards"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>灵犀现在更懂你的部分</h2>
          </div>
          <div class="grid grid-three" id="understandGrid"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="bottom-link is-active" href="./"><span>首页</span></a>
        <a class="bottom-link" href="today/"><span>今日</span></a>
        <a class="bottom-link" href="connection/"><span>接管</span></a>
        <a class="bottom-link" href="profile/"><span>我的</span></a>
      </nav>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
